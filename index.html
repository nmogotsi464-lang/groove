<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Groove Galleria</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    .product {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }
  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav>

  <div class="logo">
    GROOVE GALLERIA
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

</nav>

  <!-- HERO -->
  <section class="hero">

    <img src="hero.jpg" alt="Groove Galleria" class="hero-image">
    <div class="overlay"></div>

    <div class="snow" id="snow"></div>

    <div class="hero-content">
      <span class="hero-tag">WINTER '26 DROP</span>

      <h1>GROOVE<br>GALLERIA</h1>

      <p>Eyewear inspired by culture, music and modern street luxury.</p>

      <div class="hero-buttons">
        <a href="#" class="hero-btn">VIEW CATALOG</a>
      </div>
    </div>

    <div class="scroll-down">SCROLL</div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Groove Galleria</p>
  </footer>

  <!-- SNOW + API SCRIPT -->
  <script>

    const snowContainer = document.getElementById('snow');

    for (let i = 0; i < 120; i++) {

      let snowflake = document.createElement('span');

      snowflake.style.left = Math.random() * 100 + 'vw';
      snowflake.style.animationDuration = (Math.random() * 5 + 5) + 's';
      snowflake.style.opacity = Math.random();
      snowflake.style.width = snowflake.style.height = Math.random() * 4 + 2 + 'px';
      snowflake.style.animationDelay = Math.random() * 5 + 's';

      snowContainer.appendChild(snowflake);
    }

    // SHEETDB PRODUCTS
    fetch("https://sheetdb.io/api/v1/5rx85jjefrjui")
      .then(res => res.json())
      .then(products => {

        const container = document.getElementById("products");

        let html = "";

        products.forEach(product => {
          html += `
            <div class="product">
              <img src="${product.image || ''}" alt="${product.name}" />
              <h3>${product.name}</h3>
              <p>R${product.price}</p>
              <p>Stock: ${product.stock}</p>

<a 
 href="https://wa.me/27706686611?text=Hi%20Groove%20Galleria,%20I'm%20interested%20in%20${product.name}"
 target="_blank"
 class="order-btn"
>
 Order on WhatsApp
</a>
            </div>
          `;
        });

        container.innerHTML = html;
      });

  </script>

</body>
    </html>
