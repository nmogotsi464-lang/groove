<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Groove Galleria</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat', sans-serif;
      background:#050505;
      color:white;
      overflow-x:hidden;
    }

    /* NAVIGATION */

    nav{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:1000;
      background:rgba(0,0,0,0.25);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-size:1.3rem;
      font-weight:700;
      letter-spacing:2px;
    }

    .nav-links{
      display:flex;
      gap:30px;
    }

    .nav-links a{
      color:white;
      text-decoration:none;
      font-size:0.9rem;
      transition:0.3s;
    }

    .nav-links a:hover{
      opacity:0.7;
    }

    /* HERO */

    .hero{
      position:relative;
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
    }

    .hero img{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      top:0;
      left:0;
      filter:brightness(0.55);
    }

    .overlay{
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.2),
        rgba(0,0,0,0.7)
      );
      z-index:1;
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:20px;
    }

    .hero-content h1{
      font-size:4rem;
      font-weight:700;
      letter-spacing:4px;
      margin-bottom:20px;
    }

    .hero-content p{
      font-size:1rem;
      max-width:600px;
      margin:auto;
      opacity:0.8;
      line-height:1.8;
    }

    .hero-btn{
      display:inline-block;
      margin-top:35px;
      padding:14px 35px;
      border:1px solid white;
      color:white;
      text-decoration:none;
      transition:0.3s;
    }

    .hero-btn:hover{
      background:white;
      color:black;
    }

    /* SNOW */

    .snow{
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;
      pointer-events:none;
      z-index:2;
    }

    .snow span{
      position:absolute;
      display:block;
      width:4px;
      height:4px;
      background:white;
      border-radius:50%;
      animation:fall linear infinite;
      opacity:0.8;
    }

    @keyframes fall{
      0%{
        transform:translateY(-10vh);
      }

      100%{
        transform:translateY(110vh);
      }
    }

    /* FEATURED */

    .featured{
      padding:100px 8%;
      background:#080808;
      text-align:center;
    }

    .featured h2{
      font-size:2rem;
      margin-bottom:50px;
    }

    .product-card{
      max-width:350px;
      margin:auto;
    }

    .product-card img{
      width:100%;
      border-radius:20px;
    }

    .product-card h3{
      margin-top:20px;
      font-size:1.2rem;
    }

    .product-card p{
      margin-top:10px;
      opacity:0.7;
    }

    /* MOBILE */

    @media(max-width:768px){

      .hero-content h1{
        font-size:2.5rem;
      }

      .nav-links{
        display:none;
      }

    }

  </style>
</head>
<body>

  <!-- NAVBAR -->

  <nav>
    <div class="logo">GROOVE GALLERIA</div>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- HERO -->

  <section class="hero">

    <!-- REPLACE THIS IMAGE -->
 <img src="hero.jpg" alt="Groove Galleria" class="hero-image">

    <div class="overlay"></div>

    <!-- SNOW -->
    <div class="snow" id="snow"></div>

    <div class="hero-content">
      <h1>WINTER VISION</h1>

      <p>
        Timeless eyewear inspired by fashion, music and cold nights.
      </p>

      <a href="#" class="hero-btn">SHOP NOW</a>
    </div>

  </section>

  <!-- FEATURED -->

  <section class="featured">

    <h2>Featured Collection</h2>

    <div class="product-card">
      <img src="your-product.jpg" alt="Product">

      <h3>Arctic Frames</h3>

      <p>
        Minimal. Bold. Cinematic.
      </p>
    </div>

  </section>

  <script>

    // SNOW GENERATOR

    const snowContainer = document.getElementById('snow');

    for(let i = 0; i < 120; i++){

      let snowflake = document.createElement('span');

      snowflake.style.left = Math.random() * 100 + 'vw';

      snowflake.style.animationDuration =
        (Math.random() * 5 + 5) + 's';

      snowflake.style.opacity = Math.random();

      snowflake.style.width =
        snowflake.style.height =
        Math.random() * 4 + 2 + 'px';

      snowflake.style.animationDelay =
        Math.random() * 5 + 's';

      snowContainer.appendChild(snowflake);
    }

  </script>

</body>
</html>
