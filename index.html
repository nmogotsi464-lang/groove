<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Groove Galleria</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->

  <nav>

    <div class="logo">
      GROOVE GALLERIA
    </div>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>

  </nav>
  
<section id="shop">
  <h2>Shop</h2>
  <div id="products"></div>
</section>
  <!-- HERO -->

  <section class="hero">

    <img src="hero.jpg" alt="Groove Galleria" class="hero-image">

    <div class="overlay"></div>

    <div class="snow" id="snow"></div>

    <div class="hero-content">

      <span class="hero-tag">
        WINTER '26 DROP
      </span>

      <h1>
        GROOVE<br>GALLERIA
      </h1>

      <p>
        Eyewear inspired by culture, music and modern street luxury.
      </p>

      <div class="hero-buttons">

        <a href="#" class="hero-btn">
          VIEW CATALOG
        </a>

        <a href="#" class="hero-btn secondary-btn">
          EXPLORE
        </a>

      </div>

    </div>

    <div class="scroll-down">
      SCROLL
    </div>

  </section>

  <!-- FEATURED -->

  <section class="featured">

    <div class="featured-title">
      <h2>Featured Collection</h2>
    </div>

    <div class="products">

      <div class="product-card">

        <img src="your-product.jpg" alt="Product">

        <div class="product-info">

          <h3>Arctic Frames</h3>

          <p>
            Minimal. Bold. Cinematic.
          </p>

        </div>

      </div>

    </div>

  </section>

  <!-- FOOTER -->

  <footer>
    <p>
      © 2026 Groove Galleria
    </p>
  </footer>

  <!-- SNOW SCRIPT -->

  <script>

    const snowContainer =
      document.getElementById('snow');

    for(let i = 0; i < 120; i++){

      let snowflake =
        document.createElement('span');

      snowflake.style.left =
        Math.random() * 100 + 'vw';

      snowflake.style.animationDuration =
        (Math.random() * 5 + 5) + 's';

      snowflake.style.opacity =
        Math.random();

      snowflake.style.width =
      snowflake.style.height =
        Math.random() * 4 + 2 + 'px';

      snowflake.style.animationDelay =
        Math.random() * 5 + 's';

      snowContainer.appendChild(snowflake);
    }

  </script>
<script>
fetch("https://sheetdb.io/api/v1/5rx85jjefrjui")
  .then(res => res.json())
  .then(products => {
    const container = document.getElementById("products");

    products.forEach(product => {
      container.innerHTML += `
        <div class="product">
          <h3>${product.name}</h3>
          <p>R${product.price}</p>
          <p>Stock: ${product.stock}</p>
        </div>
      `;
    });
  });
  </script>
</body>
</html>
